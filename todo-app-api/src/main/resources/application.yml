server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/todo-app-api;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

